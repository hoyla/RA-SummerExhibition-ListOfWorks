name: CI / CD

on:
  push:
    branches: ["**"] # all branches
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write # needed for OIDC → AWS credentials

env:
  AWS_REGION: eu-north-1
  ECR_REPOSITORY: catalogue-app
  ECS_CLUSTER: catalogue
  ECS_SERVICE_STAGING: catalogue-staging
  ECS_SERVICE_PROD: catalogue-prod
  TASK_DEF_FILE: .aws/task-definition.json

jobs:
  # ── 1. Unit tests (all branches + PRs) ─────────────────────────────
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest tests/ -x -q --tb=short

  # ── 2. Build Docker image + smoke test (all branches) ──────────────
  docker:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t catalogue-app .

      - name: Smoke-test container starts
        run: |
          # Start Postgres + app via docker compose and hit health check
          docker compose up -d --wait --timeout 60
          # Retry up to 10 times (the app may still be initialising)
          for i in $(seq 1 10); do
            if curl -sf http://localhost:8000/health; then
              echo ""
              echo "Health check passed on attempt $i"
              break
            fi
            echo "Attempt $i failed, retrying in 2s..."
            sleep 2
          done
          # Final check (fail the step if unhealthy)
          curl -sf --retry 3 --retry-delay 2 http://localhost:8000/health
          docker compose down

  # ── 3. Push to ECR (pushes only, not PRs) ──────────────────────────
  push-ecr:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: docker
    timeout-minutes: 10
    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY"
          docker build -t "$IMAGE:$IMAGE_TAG" -t "$IMAGE:latest" .
          docker push "$IMAGE:$IMAGE_TAG"
          docker push "$IMAGE:latest"
          echo "image=$IMAGE:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

  # ── 4. Deploy to STAGING (non-main branches) ──────────────────────
  deploy-staging:
    if: github.event_name == 'push' && github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: push-ecr
    timeout-minutes: 10
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Render task definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.TASK_DEF_FILE }}
          container-name: app
          image: ${{ needs.push-ecr.outputs.image }}

      - name: Deploy to staging
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE_STAGING }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  # ── 5. Deploy to PRODUCTION (main branch only, automatic) ─────────
  deploy-prod:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: push-ecr
    timeout-minutes: 10
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Render task definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.TASK_DEF_FILE }}
          container-name: app
          image: ${{ needs.push-ecr.outputs.image }}

      - name: Deploy to production
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE_PROD }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
