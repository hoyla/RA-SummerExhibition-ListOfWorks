services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: catalogue
      POSTGRES_USER: catalogue
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalogue -d catalogue"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    image: catalogue-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://catalogue:${POSTGRES_PASSWORD:-changeme}@db:5432/catalogue
      API_KEY: ${API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      UPLOAD_DIR: /app/uploads
      # Comma-separated allowed CORS origins. Leave unset for same-origin only.
      # CORS_ORIGINS: https://catalogue.example.com
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads:
